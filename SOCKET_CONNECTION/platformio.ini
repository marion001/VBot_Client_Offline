[platformio]
data_dir = .pio/littlefs_data
default_envs = esp32

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
board_build.partitions = partitions_vbot_ota.csv
board_build.filesystem = littlefs
extra_scripts =
  pre:scripts/gzip_webui.py
build_flags =
  -DCORE_DEBUG_LEVEL=1
  -DELEGANTOTA_USE_ASYNC_WEBSERVER=1
  -std=gnu++2a
build_unflags =
  -std=gnu++11
  -std=gnu++14
  -std=gnu++17
lib_deps =
  tzapu/WiFiManager@^2.0.17
  links2004/WebSockets@^2.6.1
  bblanchon/ArduinoJson@^7.4.2
  earlephilhower/ESP8266Audio@^1.9.9
  ESP32Async/AsyncTCP@^3.4.7
  ESP32Async/ESPAsyncWebServer@^3.7.10
  ayushsharma82/ElegantOTA@^3.1.7
  fastled/FastLED@^3.9.16

[env:esp32]
board = esp32dev
build_flags =
  ${env.build_flags}
  -DVBOT_BUILD_TARGET=\"ESP32\"
  -DVBOT_UPDATE_FAMILY=\"ESP32\"

[env:esp32-psram]
board = esp32dev
build_flags =
  ${env.build_flags}
  -DVBOT_BUILD_TARGET=\"ESP32_PSRAM\"
  -DVBOT_UPDATE_FAMILY=\"ESP32\"
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -mfix-esp32-psram-cache-strategy=memw

[env:esp32-wrover]
board = freenove_esp32_wrover
build_flags =
  ${env.build_flags}
  -DVBOT_BUILD_TARGET=\"ESP32_WROVER\"
  -DVBOT_UPDATE_FAMILY=\"ESP32\"
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -mfix-esp32-psram-cache-strategy=memw

[env:esp32-psram-8mb]
board = esp32dev
board_build.partitions = partitions_vbot_ota_8mb.csv
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
build_flags =
  ${env.build_flags}
  -DVBOT_BUILD_TARGET=\"ESP32_PSRAM_8MB\"
  -DVBOT_UPDATE_FAMILY=\"ESP32\"
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -mfix-esp32-psram-cache-strategy=memw

[env:esp32-psram-16mb]
board = esp32dev
board_build.partitions = partitions_vbot_ota_16mb.csv
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
build_flags =
  ${env.build_flags}
  -DVBOT_BUILD_TARGET=\"ESP32_PSRAM_16MB\"
  -DVBOT_UPDATE_FAMILY=\"ESP32\"
  -DBOARD_HAS_PSRAM
  -mfix-esp32-psram-cache-issue
  -mfix-esp32-psram-cache-strategy=memw

[env:esp32s3]
board = esp32-s3-devkitc-1
build_flags =
  ${env.build_flags}
  -DVBOT_BUILD_TARGET=\"ESP32S3_N8\"
  -DVBOT_UPDATE_FAMILY=\"ESP32S3\"

[env:esp32s3-n8r2]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_vbot_ota_8mb.csv
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.arduino.memory_type = qio_qspi
board_build.psram_type = qspi
board_build.flash_mode = qio
build_flags =
  ${env.build_flags}
  -DVBOT_BUILD_TARGET=\"ESP32S3_N8R2\"
  -DVBOT_UPDATE_FAMILY=\"ESP32S3\"
  -DBOARD_HAS_PSRAM

[env:esp32s3-n8r8]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_vbot_ota_8mb.csv
board_build.flash_size = 8MB
board_upload.flash_size = 8MB
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
build_flags =
  ${env.build_flags}
  -DVBOT_BUILD_TARGET=\"ESP32S3_N8R8\"
  -DVBOT_UPDATE_FAMILY=\"ESP32S3\"
  -DBOARD_HAS_PSRAM

[env:esp32s3-n16r8]
board = esp32-s3-devkitc-1
board_build.partitions = partitions_vbot_ota_16mb.csv
board_build.flash_size = 16MB
board_upload.flash_size = 16MB
board_build.arduino.memory_type = qio_opi
board_build.psram_type = opi
board_build.flash_mode = qio
build_flags =
  ${env.build_flags}
  -DVBOT_BUILD_TARGET=\"ESP32S3_N16R8\"
  -DVBOT_UPDATE_FAMILY=\"ESP32S3\"
  -DBOARD_HAS_PSRAM
